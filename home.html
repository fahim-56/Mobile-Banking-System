<!DOCTYPE html>
<html lang="en">
<!-- <html lang="en" data-theme="light"> -->
<!-- <html lang="en" data-theme="dark"> -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Payoo || Home</title>
    <link href="assets/logo.png" rel="icon" type="image/x-icon">

    <!-- daysiUI and Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="text-black min-h-screen max-w-md mx-auto bg-slate-50">
    <div>
        <nav class="border-b border-gray-400 py-4">
            <div class="flex items-center justify-around">
                <div class="left flex items-center">
                    <a onclick="visual(recentTransactionsTitle.id)" class="flex items-center cursor-pointer">
                        <img src="./assets/logo.png" alt="Payoo Logo" class="h-10 w-auto mr-2">
                    </a>
                    <div>
                        <p class="text-xl font-bold text-gray-800">$ <span id="balance">45000</span></p>
                        <p class=" text-gray-500/60">Available Balance</p>
                    </div>

                </div>
                <div class="right">
                    <a href="./index.html" class="btn border border-gray-300"> <i
                            class="fa-solid fa-arrow-right-from-bracket"></i> Log out</a>
                </div>
            </div>
        </nav>
        <section class="px-6">
            <p class="text-3xl font-bold py-4">Welcome to Pay<span class="text-purple-800">oo</span></p>
            <p>Enjoy easy and convenient financial services with lowest Cash out charge...</p>
        </section>
        <section class="grid grid-cols-3 p-6 gap-4">
            <button onclick="visual('addMoneyId')" class="btn flex-col h-full py-4" id="addMoney">
                <img src="./assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button onclick="visual('cashOutId')" class="btn flex-col h-full py-4" id="cashout">
                <img src="./assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>
            <button onclick="visual('transferId')" class="btn flex-col h-full py-4" id="transferMoney">
                <img src="./assets/opt-3.png" alt="">
                <p>Transfer Money</p>
            </button>
            <button onclick="visual('getBonusId')" class="btn flex-col h-full py-4" id="getBonus">
                <img src="./assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button onclick="visual('payBillId')" class="btn flex-col h-full py-4" id="payBill">
                <img src="./assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button onclick="visual('transactionID')" class="btn flex-col h-full py-4" id="transaction">
                <img src="./assets/opt-6.png" alt="">
                <p>Transaction</p>
            </button>
        </section>
    </div>

    <div id="addMoneyId" class="p-3">
        <h1 class="font-bold text-2xl p-5">
            Add Money
        </h1>
        <form class="space-y-6 bg-white w-11/12 mx-auto p-3 rounded-2xl mb-40">
            <div>
                <label for="amount" class="block text-lg font-medium text-gray-500">Select a Bank</label>
                <select
                    class="select appearance-none mt-1 w-11/12 px-4 border  border-gray-300 rounded-full text-lg shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100 h-13"
                    id="bankName" name="bankName" required>
                    <option disabled selected>Select a Bank</option>
                    <option>IBBL</option>
                    <option>JBL</option>
                    <option>DBBL</option>
                </select>
            </div>
            <div>
                <label for="phone" class="block text-lg font-medium text-gray-500">Bank Account Number</label>
                <input type="tel" placeholder="Enter 13 digit bank account number" maxlength="13" minlength="13"
                    id="bankAccount" name="bankAccount" required
                    class="mt-1 w-11/12 px-4 py-4 border border-gray-300 rounded-full shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100">
            </div>
            <div>
                <label class="block text-lg font-medium text-gray-500">Amount to add</label>
                <input type="number" placeholder="Enter amount to add" id="amount" name="amount" required
                    class="mt-1 w-11/12 px-4 py-4 border border-gray-300 rounded-full shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100">
            </div>
            <div>
                <label class="block text-lg font-medium text-gray-500">PIN Number</label>
                <input type="password" placeholder="Enter your 4-digit PIN" maxlength="4" minlength="4" id="password"
                    name="password" required
                    class="mt-1 w-11/12 px-4 py-4 border border-gray-300 rounded-full shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100">
            </div>

            <div>
                <button type="submit" id="add-money-btn"
                    class="w-11/12 flex justify-center py-4 px-4 border border-transparent rounded-full shadow-sm text-lg font-medium text-white bg-indigo-800 hover:bg-indigo-900 focus:ring-indigo-500">
                    Add Money
                </button>
            </div>
        </form>
    </div>

    <div id="cashOutId" class="p-3">
        <h1 class="font-bold text-2xl p-5">
            Cashout
        </h1>
        <form class="space-y-6 bg-white w-11/12 mx-auto p-3 rounded-2xl mb-40">
            <div>
                <label for="phone" class="block text-lg font-medium text-gray-500">Agent Number</label>
                <input type="tel" placeholder="Enter 11 digit number" maxlength="11" minlength="11" id="phone"
                    name="phone" required
                    class="mt-1 w-11/12 px-4 py-4 border border-gray-300 rounded-full shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100">
            </div>
            <div>
                <label for="amount" class="block text-lg font-medium text-gray-500">Amount</label>
                <input type="number" placeholder="Enter amount to withdraw" id="cashoutAmount" name="amount" required
                    class="mt-1 w-11/12 px-4 py-4 border border-gray-300 rounded-full shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100">
            </div>
            <div>
                <label for="password" class="block text-lg font-medium text-gray-500">PIN Number</label>
                <input type="password" placeholder="Enter your 4-digit PIN" maxlength="4" minlength="4"
                    id="cashoutPassword" name="password" required
                    class="mt-1 w-11/12 px-4 py-4 border border-gray-300 rounded-full shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100">
            </div>

            <div>
                <button type="submit" id="withdraw-btn"
                    class="w-11/12 flex justify-center py-4 px-4 border border-transparent rounded-full shadow-sm text-lg font-medium text-white bg-indigo-800 hover:bg-indigo-900 focus:ring-indigo-500">
                    Withdraw Money
                </button>
            </div>
        </form>
    </div>

    <div id="transferId" class="p-3">
        <h1 class="font-bold text-2xl p-5">
            Transfer Money
        </h1>
        <form class="space-y-6 bg-white w-11/12 mx-auto p-3 rounded-2xl mb-40">
            <div>
                <label for="phone" class="block text-lg font-medium text-gray-500">Transfer Account Number</label>
                <input type="tel" placeholder="Enter 11 digit number" maxlength="11" minlength="11" id="transferPhone"
                    name="phone" required
                    class="mt-1 w-11/12 px-4 py-4 border border-gray-300 rounded-full shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100">
            </div>
            <div>
                <label for="amount" class="block text-lg font-medium text-gray-500">Amount</label>
                <input type="number" placeholder="Enter amount to transfer" id="transferAmount" name="amount" required
                    class="mt-1 w-11/12 px-4 py-4 border border-gray-300 rounded-full shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100">
            </div>
            <div>
                <label for="password" class="block text-lg font-medium text-gray-500">PIN Number</label>
                <input type="password" placeholder="Enter your 4-digit PIN" maxlength="4" minlength="4"
                    id="transferPassword" name="password" required
                    class="mt-1 w-11/12 px-4 py-4 border border-gray-300 rounded-full shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100">
            </div>

            <div>
                <button type="submit" id="transfer-btn"
                    class="w-11/12 flex justify-center py-4 px-4 border border-transparent rounded-full shadow-sm text-lg font-medium text-white bg-indigo-800 hover:bg-indigo-900 focus:ring-indigo-500">
                    Transfer Money
                </button>
            </div>
        </form>
    </div>

    <div id="getBonusId" class="p-3">
        <h1 class="font-bold text-2xl p-5">
            Get-Bonus
        </h1>
        <form class="space-y-6 bg-white w-11/12 mx-auto p-3 rounded-2xl mb-40">

            <div>
                <label class="block text-lg font-medium text-gray-500">Enter Bonus Coupon</label>
                <input type="text" placeholder="Enter bonus coupon code" id="bonusCoupon" name="bonusCoupon" required
                    class="mt-1 w-11/12 px-4 py-4 border border-gray-300 rounded-full shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100">
            </div>

            <div>
                <button type="submit" id="getBonusBtn"
                    class="w-11/12 flex justify-center py-4 px-4 border border-transparent rounded-full shadow-sm text-lg font-medium text-white bg-indigo-800 hover:bg-indigo-900 focus:ring-indigo-500">
                    Get-Bonus
                </button>
            </div>
        </form>
    </div>

    <div id="payBillId" class="p-3">
        <h1 class="font-bold text-2xl p-5">
            Pay Bill
        </h1>
        <form class="space-y-6 bg-white w-11/12 mx-auto p-3 rounded-2xl mb-40">
            <div>
                <label for="amount" class="block text-lg font-medium text-gray-500">Select Bill Type To Pay</label>
                <select
                    class="select appearance-none mt-1 w-11/12 px-4 border  border-gray-300 rounded-full text-lg shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100 h-13"
                    id="payType" name="payType" required>
                    <option disabled selected>Select Bill Type</option>
                    <option>Electricity</option>
                    <option>Gas</option>
                    <option>Water</option>
                    <option>Internet</option>
                    <option>Television</option>
                    <option>Telephone</option>
                </select>
            </div>
            <div>
                <label for="phone" class="block text-lg font-medium text-gray-500">Bill Account Number</label>
                <input type="tel" placeholder="Enter bill account number(8-13 digits)" maxlength="13" minlength="8" id="billAccount"
                    name="billAccount" required
                    class="mt-1 w-11/12 px-4 py-4 border border-gray-300 rounded-full shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100">
            </div>
            <div>
                <label class="block text-lg font-medium text-gray-500">Amount to pay</label>
                <input type="number" placeholder="Enter amount to pay" id="billAmount" name="billAmount" required
                    class="mt-1 w-11/12 px-4 py-4 border border-gray-300 rounded-full shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100">
            </div>
            <div>
                <label class="block text-lg font-medium text-gray-500">PIN Number</label>
                <input type="password" placeholder="Enter your 4-digit PIN" maxlength="4" minlength="4" id="payBillPassword"
                    name="payBillPassword" required
                    class="mt-1 w-11/12 px-4 py-4 border border-gray-300 rounded-full shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-black bg-slate-100">
            </div>

            <div>
                <button type="submit" id="payBillBtn"
                    class="w-11/12 flex justify-center py-4 px-4 border border-transparent rounded-full shadow-sm text-lg font-medium text-white bg-indigo-800 hover:bg-indigo-900 focus:ring-indigo-500">
                    Pay Bill
                </button>
            </div>
        </form>
    </div>

    <div id="transactionID" class="p-3">
        <h1 id="recentTransactionsTitle" class="font-bold text-2xl p-5">Recent Transactions</h1>
        <h1 id="transactionHistoryTitle" class="font-bold text-2xl p-5">
            Transaction History
        </h1>
        <div id="history-container">

        </div>
    </div>

    <script src="./scripts/machine.js"></script>
    <script src="./scripts/home.js"></script>
    <script src="./scripts/addMoney.js"></script>
    <script src="./scripts/cashout.js"></script>
    <script src="./scripts/transfer.js"></script>
    <script src="./scripts/getBonus.js"></script>
    <script src="./scripts/payBill.js"></script>
</body>

</html>
